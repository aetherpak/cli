<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__AETHERPAK_REPO_TITLE__</title>
  <meta name="description" content="Flatpak repository powered by AetherPak.">
  <meta property="og:title" content="__AETHERPAK_REPO_TITLE__">
  <meta property="og:description" content="Flatpak repository powered by AetherPak.">
  <meta property="og:type" content="website">
  <link rel="icon" href="__AETHERPAK_BRANDING_FAVICON_URL__">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.className = theme;
    })();
  </script>

  <style>
    :root {
      --accent-color: __AETHERPAK_BRANDING_ACCENT_COLOR__;
      --primary: var(--primary-default-light, #7c3aed);
      --primary-glow: color-mix(in srgb, var(--primary) 15%, transparent);
      --success: #10b981;
      --font-sans: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

      /* Light Theme Colors (Default) */
      --bg: #f9f9fb;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #09090b;
      --text-muted: #5e5e64;
      --shadow: 0 4px 20px rgba(9, 9, 11, 0.05);
      --shadow-hover: 0 12px 30px rgba(9, 9, 11, 0.12);
      --code-border: #222226;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --card: #121214;
        --border: #222226;
        --text: #f4f4f5;
        --text-muted: #a1a1aa;
        --primary: var(--primary-default-dark, #8b5cf6);
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        --shadow-hover: 0 12px 30px rgba(0, 0, 0, 0.45);
        --code-border: #202723;
      }
    }

    html.light {
      --bg: #f9f9fb;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #09090b;
      --text-muted: #5e5e64;
      --primary: var(--primary-default-light, #7c3aed);
      --shadow: 0 4px 20px rgba(9, 9, 11, 0.05);
      --shadow-hover: 0 12px 30px rgba(9, 9, 11, 0.12);
      --code-border: #222226;
    }

    html.dark {
      --bg: #09090b;
      --card: #121214;
      --border: #222226;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: var(--primary-default-dark, #8b5cf6);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      --shadow-hover: 0 12px 30px rgba(0, 0, 0, 0.45);
      --code-border: #202723;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.5;
      padding: 2rem 1rem;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(800px, 100%);
      height: 400px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .container { max-width: 820px; margin: 0 auto; }

    header {
      position: relative;
      text-align: center;
      margin-bottom: 2.5rem;
      padding-top: 1.5rem;
      animation: fadeIn 0.8s ease-out;
    }

    .header-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .theme-toggle-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow);
    }

    .theme-toggle-btn:hover {
      color: var(--text);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .theme-toggle-btn:active {
      transform: translateY(0) scale(0.95);
    }

    .theme-toggle-btn svg {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .theme-toggle-btn:hover svg {
      transform: rotate(15deg);
    }

    html.light .theme-toggle-btn .sun-icon { display: none; }
    html.dark .theme-toggle-btn .moon-icon { display: none; }

    @media (prefers-color-scheme: dark) {
      html:not(.light) .theme-toggle-btn .moon-icon { display: none; }
      html:not(.light) .theme-toggle-btn .sun-icon { display: block; }
    }
    @media (prefers-color-scheme: light) {
      html:not(.dark) .theme-toggle-btn .sun-icon { display: none; }
      html:not(.dark) .theme-toggle-btn .moon-icon { display: block; }
    }

    .logo-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: var(--primary-glow);
      border: 1px solid var(--primary);
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 1rem;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .logo-badge img {
      max-height: 48px;
      border-radius: 6px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to right, var(--text), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: var(--text-muted); margin-top: 0.25rem; }

    #app-content { animation: slideUp 0.7s ease-out 0.15s both; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(600px circle at var(--mouse-x, -200px) var(--mouse-y, -200px), rgba(139, 92, 246, 0.06), transparent 40%);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    html.light .card::before {
      background: radial-gradient(600px circle at var(--mouse-x, -200px) var(--mouse-y, -200px), rgba(124, 58, 237, 0.03), transparent 40%);
    }

    .card > * { position: relative; z-index: 1; }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    /* Repository setup card subtly highlighted with a blended accent border */
    .card.setup {
      background: linear-gradient(180deg, var(--bg) 0%, var(--card) 100%);
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    /* Clean Code blocks styling from demo */
    .code-container {
      margin: 1rem 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--code-border);
      background: #111513;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #0b0e0c;
      border-bottom: 1px solid var(--code-border);
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .code-lang {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .code-lang::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }

    .code-container .code-block {
      padding: 0.85rem 1rem;
      margin: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      overflow-x: auto;
    }

    .code-container .code-block code {
      display: block;
      white-space: pre;
      font-family: var(--font-mono);
      font-size: 0.83rem;
      line-height: 1.6;
      color: #ecf1ed;
    }

    .code-container .btn-copy {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      padding: 0.35rem;
      border-radius: 6px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      align-items: center;
      justify-content: center;
    }

    .code-container .btn-copy:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: var(--primary);
    }

    .code-container .btn-copy.success {
      color: var(--success);
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.15);
    }

    .code-keyword { color: #58a6ff; font-weight: 600; }
    .code-subcommand { color: #f28b54; }
    .code-flag { color: #ff7b72; }
    .code-url { color: #34d399; text-decoration: underline; text-underline-offset: 3px; }

    .actions { margin-top: 1.25rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* Rounded Pill buttons from demo */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      border-radius: 9999px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      text-decoration: none;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: color-mix(in srgb, var(--primary) 85%, #ffffff);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn.ghost {
      background: var(--card);
      border-color: var(--border);
      color: var(--text);
    }

    .btn.ghost:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .app-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.25rem; }

    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      object-fit: contain;
    }

    .app-icon.placeholder { display: flex; align-items: center; justify-content: center; color: var(--primary); }

    h2.app-name {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .app-id { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); }
    .app-summary { color: var(--text-muted); font-size: 0.95rem; margin: 0.25rem 0 0.5rem; }

    .badge {
      padding: 0.15rem 0.5rem;
      font-size: 0.72rem;
      font-family: var(--font-mono);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    html.light .badge {
      background: rgba(0, 0, 0, 0.02);
    }

    .badge.primary {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
    }

    .releases { margin-top: 1.25rem; border-left: 2px solid var(--border); padding-left: 1.25rem; }
    .release { position: relative; padding-bottom: 1.25rem; }
    .release:last-child { padding-bottom: 0; }

    .release::before {
      content: '';
      position: absolute;
      left: calc(-1.25rem - 6px);
      top: 0.35rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 3px var(--bg);
      transition: background-color 0.4s;
    }

    .release.old::before { background: var(--text-muted); }
    .release-head { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .release-date { color: var(--text-muted); font-size: 0.85rem; margin-left: auto; }
    .release-meta { color: var(--text-muted); font-size: 0.78rem; font-family: var(--font-mono); margin: 0.4rem 0 0.5rem; }

    .empty-state {
      text-align: center;
      padding: 3.5rem 2rem;
      border: 2px dashed var(--border);
      border-radius: 16px;
      color: var(--text-muted);
      background: var(--card);
    }

    footer { text-align: center; padding: 3rem 0 1rem; color: var(--text-muted); font-size: 0.85rem; }
    footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }



    .search-container {
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-input-wrapper input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow);
    }

    .search-input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* Skeletons */
    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      pointer-events: none;
    }

    .skeleton-line {
      height: 1rem;
      background: linear-gradient(90deg, var(--border) 25%, color-mix(in srgb, var(--border) 60%, var(--text-muted)) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    .skeleton-line.title { height: 1.5rem; width: 60%; margin-bottom: 1.25rem; }
    .skeleton-line.paragraph { height: 0.85rem; width: 90%; }
    .skeleton-line.paragraph-short { height: 0.85rem; width: 70%; }

    .skeleton-app-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .skeleton-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--border) 25%, color-mix(in srgb, var(--border) 60%, var(--text-muted)) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      flex-shrink: 0;
    }

    .skeleton-app-titles { flex-grow: 1; }
    .skeleton-app-title { height: 1.25rem; width: 45%; margin-bottom: 0.5rem; }
    .skeleton-app-id { height: 0.8rem; width: 30%; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }



    /* Companions / Extensions section styling */
    .companions-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border);
    }
    .companions-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .companions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.5rem;
    }
    .companion-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    html.dark .companion-item {
      background: rgba(255, 255, 255, 0.02);
    }
    .companion-item:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px var(--primary-glow);
    }
    .companion-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 0;
    }
    .companion-icon-wrapper {
      color: var(--primary);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .companion-details {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .companion-name {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .companion-meta {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .companion-actions {
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .btn-companion-action {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      padding: 0.2rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      align-items: center;
      justify-content: center;
    }
    .btn-companion-action:hover {
      color: var(--text);
      background: var(--card);
      border-color: var(--primary);
    }
    .btn-companion-action.success {
      color: var(--success);
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.1);
    }


    /* Focus visible accessibility outlines */
    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Visually hidden but screen reader accessible */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle Theme">
          <svg class="sun-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
          <svg class="moon-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        </button>
      </div>
      __AETHERPAK_BRANDING_LOGO_HTML__
      <h1>__AETHERPAK_REPO_TITLE__</h1>
    </header>

    <main id="app-content">
      <div id="setup-container"></div>

      <div class="search-container" id="search-wrapper" style="display: none;">
        <div class="search-input-wrapper">
          <span class="search-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input type="text" id="app-search" placeholder="Search applications by name, ID, or summary..." aria-label="Search applications">
        </div>
        <div id="search-status" class="sr-only" aria-live="polite"></div>
      </div>

      <div id="apps-container">
        <!-- Skeletons load here -->
        <div class="skeleton-card">
          <div class="skeleton-line title"></div>
          <div class="skeleton-line" style="height: 3.5rem; border-radius: 8px;"></div>
          <div class="skeleton-line" style="height: 2.2rem; width: 140px; border-radius: 8px; margin-top: 1rem;"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-app-header">
            <div class="skeleton-icon"></div>
            <div class="skeleton-app-titles">
              <div class="skeleton-line skeleton-app-title"></div>
              <div class="skeleton-line skeleton-app-id"></div>
            </div>
          </div>
          <div class="skeleton-line paragraph"></div>
          <div class="skeleton-line paragraph-short"></div>
          <div class="skeleton-line" style="height: 1.5rem; width: 80px; margin-top: 1.5rem; margin-bottom: 0.5rem;"></div>
          <div class="skeleton-line" style="height: 4rem; border-radius: 8px;"></div>
        </div>
      </div>
    </main>

    <footer><p>__AETHERPAK_BRANDING_FOOTER_TEXT__</p></footer>
  </div>

  <script>
    // Setup accent colors dynamically
    (function() {
      const accentColor = '__AETHERPAK_BRANDING_ACCENT_COLOR__';
      const isDefaultAccent = accentColor === '#8b5cf6' || /^__.+__$/.test(accentColor);
      if (isDefaultAccent) {
        document.documentElement.style.setProperty('--primary-default-dark', '#8b5cf6');
        document.documentElement.style.setProperty('--primary-default-light', '#7c3aed');
      } else {
        document.documentElement.style.setProperty('--primary-default-dark', accentColor);
        document.documentElement.style.setProperty('--primary-default-light', accentColor);
      }
    })();

    const remoteName = (n => /^__.+__$/.test(n) ? 'aetherpak' : n)('__AETHERPAK_REMOTE_NAME__');
    const ICON_COPY = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_DL = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;
    const ICON_APP = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`;

    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    function copyCmd(btn) {
      const container = btn.closest('.code-container');
      if (container) {
        copyToClipboard(container.querySelector('code').textContent, btn);
      }
    }

    document.addEventListener('keydown', e => {
      // Focus search input when "/" is pressed (unless focusing another input/textarea)
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        const searchInput = document.getElementById('app-search');
        const searchWrapper = document.getElementById('search-wrapper');
        if (searchInput && searchWrapper && searchWrapper.style.display !== 'none') {
          e.preventDefault();
          searchInput.focus();
        }
      }
    });

    function fmtSize(b) { b = +b || 0; const u = ['B','KB','MB','GB']; let i = 0; while (b >= 1024 && i < u.length-1) { b /= 1024; i++; } return `${b.toFixed(b < 10 && i > 0 ? 1 : 0)} ${u[i]}`; }
    function fmtDate(ts) { const d = new Date((+ts) * 1000); return isNaN(d) ? '' : d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }

    function appMeta(xml) {
      try { const doc = new DOMParser().parseFromString(xml, 'application/xml');
        const pick = sel => { const e = [...doc.querySelectorAll(sel)]; return (e.find(x => !x.getAttribute('xml:lang')) || e[0])?.textContent; };
        return { name: pick('component > name'), summary: pick('component > summary') }; }
      catch (e) { return {}; }
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const o = btn.innerHTML; btn.classList.add('success');
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = o; }, 1500);
      });
    }

    function setupCardHover(card) {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', (e.clientX - r.left) + 'px');
        card.style.setProperty('--mouse-y', (e.clientY - r.top) + 'px');
      });
    }

    function highlightCmd(cmd) {
      let htmlStr = esc(cmd);
      // Extract URLs first to prevent tag and keyword conflicts
      const urls = [];
      htmlStr = htmlStr.replace(/((?:oci\+)?https?:\/\/[^\s\\]+|sigs\/[^\s\\]+)/g, function(match) {
        urls.push(match);
        return `__AETHERPAK_URL_PLACEHOLDER_${urls.length - 1}__`;
      });
      // Replace flags first (preceded by start of string or space) to prevent tag conflicts
      htmlStr = htmlStr.replace(/(^|\s)(--?[a-zA-Z0-9-]+)/g, '$1<span class="code-flag">$2</span>');
      // Replace keywords (only as standalone commands, not part of words or URLs)
      htmlStr = htmlStr.replace(/(^|\s)(flatpak)\b/g, '$1<span class="code-keyword">$2</span>');
      htmlStr = htmlStr.replace(/\b(install|remote-add|remote-modify)\b/g, '<span class="code-subcommand">$1</span>');
      // Restore URLs wrapped in code-url span
      for (let i = 0; i < urls.length; i++) {
        htmlStr = htmlStr.replace(`__AETHERPAK_URL_PLACEHOLDER_${i}__`, `<span class="code-url">${urls[i]}</span>`);
      }
      return htmlStr;
    }

    function setupThemeToggle() {
      const toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', () => {
          const current = document.documentElement.classList.contains('dark')
            || (window.matchMedia('(prefers-color-scheme: dark)').matches && !document.documentElement.classList.contains('light'))
            ? 'dark' : 'light';
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.className = next;
          localStorage.setItem('theme', next);
        });
      }
    }

    function setupSearch() {
      const searchInput = document.getElementById('app-search');
      const searchStatus = document.getElementById('search-status');
      if (!searchInput) return;

      let announceTimeout = null;

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const cards = document.querySelectorAll('#app-content .app-card');
        let visibleCount = 0;

        cards.forEach(card => {
          const name = card.dataset.appName.toLowerCase();
          const id = card.dataset.appId.toLowerCase();
          const summary = card.dataset.appSummary.toLowerCase();

          if (name.includes(query) || id.includes(query) || summary.includes(query)) {
            card.style.display = 'block';
            visibleCount++;
          } else {
            card.style.display = 'none';
          }
        });

        const emptySearch = document.getElementById('empty-search');
        if (visibleCount === 0) {
          if (!emptySearch) {
            const div = document.createElement('div');
            div.id = 'empty-search';
            div.className = 'empty-state';
            div.style.marginTop = '2rem';
            div.innerHTML = `<h2>No matching applications</h2><p>Try searching for a different keyword or app ID.</p>`;
            document.getElementById('apps-container').appendChild(div);
          }
        } else {
          if (emptySearch) emptySearch.remove();
        }

        if (searchStatus) {
          clearTimeout(announceTimeout);
          announceTimeout = setTimeout(() => {
            if (query === '') {
              searchStatus.textContent = '';
            } else {
              searchStatus.textContent = visibleCount === 1
                ? '1 application found.'
                : `${visibleCount} applications found.`;
            }
          }, 500);
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupThemeToggle();

      const pagesUrl = location.origin + location.pathname.replace(/\/(index\.html)?$/, '');

      const render = (setupHtml, appsHtml) => {
        const setupDiv = document.getElementById('setup-container');
        const appsDiv = document.getElementById('apps-container');
        if (setupDiv) setupDiv.innerHTML = setupHtml;
        if (appsDiv) {
          appsDiv.innerHTML = appsHtml;
          appsDiv.querySelectorAll('.card').forEach(setupCardHover);
        }
        setupDiv?.querySelectorAll('.card').forEach(setupCardHover);
      };

      const legacyCmd = `flatpak remote-add --if-not-exists --user --no-gpg-verify \\
  ${remoteName} \\
  oci+${pagesUrl}`;

      function codeBlock(label, cmd) {
        const labelHtml = label ? `<div class="section-label">${label}</div>` : '';
        return `
          ${labelHtml}
          <div class="code-container">
            <div class="code-header">
              <span class="code-lang">SHELL</span>
              <button class="btn-copy" onclick="copyCmd(this)" title="Copy" aria-label="Copy to clipboard">${ICON_COPY}</button>
            </div>
            <pre class="code-block"><code>${highlightCmd(cmd)}</code></pre>
          </div>`;
      }

      function buildSetup(signing) {
        const repoFile = `${remoteName}.flatpakrepo`;
        const viewIndex = `<a class="btn ghost" href="index/static" target="_blank">View OCI index</a>`;
        if (signing && signing.enabled && signing.lookaside) {
          const look = `${pagesUrl}/${signing.lookaside}`;
          const verified = `flatpak remote-add --user \\
  ${remoteName} \\
  ${pagesUrl}/${repoFile}`;
          const modifyCmd = `flatpak remote-modify --user \\
  --signature-lookaside=${look} \\
  ${remoteName}`;
          return `
            <div class="card setup">
              ${codeBlock('Add this repository (flatpak ≥ 1.17)', verified)}
              <details style="margin-top:1rem;">
                <summary style="cursor:pointer;color:var(--text-muted);font-size:0.85rem;">Older clients (&lt; 1.17) setup instructions</summary>
                <p class="app-summary" style="margin-top:0.5rem;">Older Flatpak versions cannot read the signature lookaside from the repository file directly. Run these commands to add the repository and configure verification manually:</p>
                ${codeBlock('Add repository unverified', legacyCmd)}
                ${codeBlock('Configure signature lookaside manually', modifyCmd)}
              </details>
              <div class="actions">
                <a class="btn primary" href="${repoFile}" download>${ICON_DL} Download .flatpakrepo</a>
                ${viewIndex}
              </div>
            </div>`;
        }
        return `
          <div class="card setup">
            ${codeBlock('Add this repository', legacyCmd)}
            <div class="actions">
              <a class="btn primary" href="${repoFile}" download>${ICON_DL} Download .flatpakrepo</a>
              ${viewIndex}
            </div>
          </div>`;
      }

      Promise.all([
        fetch('sigs/signing.json').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('index/static').then(r => { if (!r.ok) throw new Error('load'); return r.json(); })
      ]).then(([signing, data]) => {
        const setup = buildSetup(signing);
        const apps = {};
        const companions = [];

        (data.Results || []).forEach(res => (res.Images || []).forEach(img => {
          const L = img.Labels || {}; const ref = L['org.flatpak.ref'];
          if (!ref || !L['org.flatpak.metadata']) return;
          const [, id, arch, branch] = ref.split('/'); if (!branch) return;

          const isDebug = id.endsWith('.Debug');
          const isLocale = id.endsWith('.Locale');

          if (isDebug || isLocale) {
            companions.push({
              id,
              arch,
              branch,
              type: isDebug ? 'Debug' : 'Locale',
              isize: L['org.flatpak.installed-size'],
              dsize: L['org.flatpak.download-size'],
              commit: L['org.flatpak.commit'],
              ts: Math.max(0, +L['org.flatpak.timestamp'] || 0)
            });
          } else {
            const a = apps[id] || (apps[id] = { id, icon: L['org.freedesktop.appstream.icon-64'], meta: appMeta(L['org.freedesktop.appstream.appdata'] || ''), ch: {} });
            const c = a.ch[branch] || (a.ch[branch] = { branch, arches: new Set(), ts: 0, isize: L['org.flatpak.installed-size'], dsize: L['org.flatpak.download-size'], commit: L['org.flatpak.commit'], companions: [] });
            c.arches.add(arch); c.ts = Math.max(c.ts, +L['org.flatpak.timestamp'] || 0);
          }
        }));

        companions.forEach(comp => {
          let parentId = '';
          if (comp.type === 'Debug') parentId = comp.id.slice(0, -6);
          else if (comp.type === 'Locale') parentId = comp.id.slice(0, -7);

          const parentApp = apps[parentId];
          if (parentApp) {
            const parentBranch = parentApp.ch[comp.branch];
            if (parentBranch) {
              let compItem = parentBranch.companions.find(c => c.type === comp.type);
              if (!compItem) {
                compItem = {
                  type: comp.type,
                  id: comp.id,
                  isize: comp.isize,
                  dsize: comp.dsize,
                  commit: comp.commit,
                  refFile: `refs/${comp.id}-${comp.branch.replace(/\//g, '-')}.flatpakref`,
                  cmd: `flatpak install --user ${remoteName} ${comp.id}//${comp.branch}`,
                  arches: new Set()
                };
                parentBranch.companions.push(compItem);
              }
              compItem.arches.add(comp.arch);
            }
          } else {
            // No parent app found, treat companion as standalone
            const a = apps[comp.id] || (apps[comp.id] = { id: comp.id, icon: '', meta: { name: comp.id.split('.').pop(), summary: comp.type + ' runtime extension' }, ch: {} });
            const c = a.ch[comp.branch] || (a.ch[comp.branch] = { branch: comp.branch, arches: new Set(), ts: 0, isize: comp.isize, dsize: comp.dsize, commit: comp.commit, companions: [] });
            c.arches.add(comp.arch); c.ts = Math.max(c.ts, comp.ts);
          }
        });

        const ids = Object.keys(apps).sort();

        // Show search bar only if there are more than 1 application
        const searchWrapper = document.getElementById('search-wrapper');
        if (ids.length > 1) {
          if (searchWrapper) {
            searchWrapper.style.display = 'block';
            setupSearch();
          }
        } else {
          if (searchWrapper) {
            searchWrapper.style.display = 'none';
          }
        }

        if (!ids.length) { render(setup, `<div class="empty-state"><h2>No applications published</h2></div>`); return; }

        const cards = ids.map(id => {
          const app = apps[id];
          const name = app.meta.name || id.split('.').pop();
            const icon = app.icon
              ? `<img class="app-icon" src="${esc(app.icon)}" alt="" aria-hidden="true">`
              : `<div class="app-icon placeholder">${ICON_APP}</div>`;
          const summary = app.meta.summary ? `<p class="app-summary">${esc(app.meta.summary)}</p>` : '';
          const rels = Object.values(app.ch).sort((a, b) => b.ts - a.ts).map((c, i) => {
            const cmd = `flatpak install --user ${remoteName} ${id}//${c.branch}`;
            const refFile = `refs/${id}-${c.branch.replace(/\//g, '-')}.flatpakref`;
            const arches = [...c.arches].sort().map(a => `<span class="badge">${esc(a)}</span>`).join('');

            let companionsHtml = '';
            if (c.companions && c.companions.length > 0) {
              const itemsHtml = c.companions.map(comp => {
                const compArches = [...comp.arches].sort().map(a => `<span class="badge">${esc(a)}</span>`).join('');
                let iconSvg = '';
                if (comp.type === 'Debug') {
                  iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 8v5a4 4 0 0 1-8 0V8"></path><line x1="6" y1="7.11" x2="2" y2="5"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="6" y1="16.89" x2="2" y2="19"></line><line x1="18" y1="7.11" x2="22" y2="5"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="18" y1="16.89" x2="22" y2="19"></line></svg>`;
                } else {
                  iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`;
                }
                return `
                  <div class="companion-item">
                    <div class="companion-info">
                      <span class="companion-icon-wrapper">${iconSvg}</span>
                      <div class="companion-details">
                        <span class="companion-name">${esc(comp.type)} Extension</span>
                        <span class="companion-meta" title="${esc(comp.id)}">${esc(comp.id)} &bull; ${fmtSize(comp.isize)} installed</span>
                      </div>
                    </div>
                    <div class="companion-actions">
                      <a class="btn-companion-action" href="${esc(comp.refFile)}" download title="Download .flatpakref" aria-label="Download ${esc(comp.type)} ref file">${ICON_DL}</a>
                      <button class="btn-companion-action" onclick="copyToClipboard('${esc(comp.cmd)}', this)" title="Copy install command" aria-label="Copy ${esc(comp.type)} install command">${ICON_COPY}</button>
                    </div>
                  </div>`;
              }).join('');

              companionsHtml = `
                <div class="companions-section">
                  <div class="companions-title">Additional Components</div>
                  <div class="companions-grid">
                    ${itemsHtml}
                  </div>
                </div>`;
            }

            return `
              <div class="release ${i ? 'old' : ''}">
                <div class="release-head">
                  <span class="badge primary">${esc(c.branch)}</span>${arches}
                  <span class="release-date">${i ? '' : 'latest &bull; '}${c.ts ? 'released ' + fmtDate(c.ts) : ''}</span>
                </div>
                <div class="release-meta">${fmtSize(c.isize)} installed &bull; ${fmtSize(c.dsize)} download${c.commit ? ' &bull; ' + esc(c.commit.slice(0, 10)) : ''}</div>
                <div class="actions"><a class="btn primary" href="${esc(refFile)}" download>${ICON_DL} Install (${esc(c.branch)})</a></div>
                ${codeBlock('', cmd)}
                ${companionsHtml}
              </div>`;
          }).join('');
          return `
            <div class="card app-card" data-app-id="${esc(id)}" data-app-name="${esc(name)}" data-app-summary="${esc(app.meta.summary || '')}">
              <div class="app-head">${icon}<div><h2 class="app-name">${esc(name)}</h2><div class="app-id">${esc(id)}</div></div></div>
              ${summary}
              <div class="section-label" style="margin-top:1rem;">Releases</div>
              <div class="releases">${rels}</div>
            </div>`;
        }).join('');

        render(setup, cards);
      }).catch((err) => {
        console.error(err);
        const searchWrapper = document.getElementById('search-wrapper');
        if (searchWrapper) searchWrapper.style.display = 'none';
        const setupDiv = document.getElementById('setup-container');
        const appsDiv = document.getElementById('apps-container');
        if (setupDiv) setupDiv.innerHTML = '';
        if (appsDiv) appsDiv.innerHTML = `<div class="empty-state" style="border-color:#ef4444;color:#f87171;"><h2>Failed to load repository</h2><p>Serve this page over HTTP and ensure index/static exists.</p></div>`;
      });
    });
  </script>
</body>
</html>
