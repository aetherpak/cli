name: Release Assets

# Triggered only when a GitHub Release is published (created by Release Please).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload:
    name: Build & Upload Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile Release Binaries
        run: make release/build

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG_NAME" dist/*.tar.gz
