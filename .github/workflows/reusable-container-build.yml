name: Reusable Container Build

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref/branch/tag/commit to checkout"
        required: true
        type: string
      image-tags:
        description: "Whitespace or newline separated list of image tags to apply"
        required: true
        type: string
      push:
        description: "Whether to push the images"
        required: false
        type: boolean
        default: true
      version:
        description: "Version to bake into the CLI binary"
        required: false
        type: string
        default: "dev"

jobs:
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha-tag: ${{ steps.resolve.outputs.sha-tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve SHA Tag and Version
        id: resolve
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Resolve version string
          VERSION="${{ inputs.version }}"
          if [ "$VERSION" = "dev" ] || [ -z "$VERSION" ]; then
            if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="git+$SHORT_SHA"
            fi
          fi

          CLEAN_VERSION=$(echo "$VERSION" | tr '+' '-')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha-tag=sha-$SHORT_SHA-$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

  build-arch:
    name: Build & Test (${{ matrix.platform }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: -amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: -arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Enable Unprivileged User Namespaces (Ubuntu 24.04+)
        shell: bash
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo "Disabling AppArmor unprivileged user namespace restrictions..."
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Build & Test Container Image
        uses: ./.github/actions/container-build
        with:
          tags: ${{ needs.resolve.outputs.sha-tag }}
          push: ${{ inputs.push }}
          platform: ${{ matrix.platform }}
          suffix: ${{ matrix.suffix }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
          version: ${{ needs.resolve.outputs.version }}


  merge-manifests:
    name: Merge Multi-Arch Manifests
    needs: [resolve, build-arch]
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Log in to the Container registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create and Push Manifest Lists
        shell: bash
        run: |
          set -euo pipefail
          TAGS=$(echo "${{ inputs.image-tags }}" | xargs)
          SHA_TAG="${{ needs.resolve.outputs.sha-tag }}"
          for tag in $TAGS; do
            echo "=== Merging tags for CLI image tag: ${tag} ==="
            podman manifest create "ghcr.io/aetherpak/cli:${tag}"
            podman manifest add "ghcr.io/aetherpak/cli:${tag}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-amd64"
            podman manifest add "ghcr.io/aetherpak/cli:${tag}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-arm64"
            podman manifest push --tls-verify=true "ghcr.io/aetherpak/cli:${tag}"

            echo "=== Merging tags for Builder image tag: ${tag}-builder ==="
            podman manifest create "ghcr.io/aetherpak/cli:${tag}-builder"
            podman manifest add "ghcr.io/aetherpak/cli:${tag}-builder" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-builder-amd64"
            podman manifest add "ghcr.io/aetherpak/cli:${tag}-builder" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-builder-arm64"
            podman manifest push --tls-verify=true "ghcr.io/aetherpak/cli:${tag}-builder"
          done

          # Promote single-arch rolling tags
          for tag in $TAGS; do
            echo "=== Promoting single-arch tags for CLI tag: ${tag} ==="
            skopeo copy --all --src-creds "${{ github.actor }}:${{ github.token }}" --dest-creds "${{ github.actor }}:${{ github.token }}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-amd64" "docker://ghcr.io/aetherpak/cli:${tag}-amd64"
            skopeo copy --all --src-creds "${{ github.actor }}:${{ github.token }}" --dest-creds "${{ github.actor }}:${{ github.token }}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-arm64" "docker://ghcr.io/aetherpak/cli:${tag}-arm64"

            echo "=== Promoting single-arch tags for Builder tag: ${tag}-builder ==="
            skopeo copy --all --src-creds "${{ github.actor }}:${{ github.token }}" --dest-creds "${{ github.actor }}:${{ github.token }}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-builder-amd64" "docker://ghcr.io/aetherpak/cli:${tag}-builder-amd64"
            skopeo copy --all --src-creds "${{ github.actor }}:${{ github.token }}" --dest-creds "${{ github.actor }}:${{ github.token }}" "docker://ghcr.io/aetherpak/cli:${SHA_TAG}-builder-arm64" "docker://ghcr.io/aetherpak/cli:${tag}-builder-arm64"
          done
