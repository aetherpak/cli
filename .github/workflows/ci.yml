name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Pre-Commit
        uses: pre-commit/action@v3.0.1

      - name: Run Tests with Coverage
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Display Coverage Report
        run: go tool cover -func=coverage.txt

  build:
    name: Compile Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile Release Binaries
        run: make release/build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree gpg

      - name: Run E2E Integration Tests
        run: make test/integration

  detect-changes:
    name: Detect Container Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      container: ${{ steps.filter.outputs.container }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Filter Paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            container:
              - 'Containerfile'
              - '.github/workflows/reusable-container-build.yml'
              - '.github/actions/container-build/action.yml'

  publish:
    name: Build & Publish Container Images
    needs: [test, integration-test, detect-changes]
    if: |
      (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.container == 'true')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-container-build.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      image-tags: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.ref == 'refs/heads/main' && 'main' || format('latest {0}', github.ref_name)) }}
      push: ${{ github.event_name != 'pull_request' }}
      version: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev' }}
