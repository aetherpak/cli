name: "AetherPak Container Build"
description: "Opinionated action to build and push CLI and Builder container images"

inputs:
  tags:
    description: "Whitespace or newline separated list of base tags (e.g. 'latest' or 'stable latest' or 'v0.7.0')"
    required: true
  username:
    description: "Registry username"
    required: false
    default: ${{ github.actor }}
  password:
    description: "Registry password"
    required: false
    default: ${{ github.token }}
  push:
    description: "Whether to push the images"
    required: false
    default: "true"
  platform:
    description: "Target platform CPU architecture (e.g. linux/amd64, linux/arm64)"
    required: false
    default: "linux/amd64"
  suffix:
    description: "Optional suffix to append to final tags (e.g. '-amd64' or '-arm64')"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Log in to the Container registry
      if: ${{ inputs.push == 'true' && inputs.password != '' }}
      uses: redhat-actions/podman-login@v1
      with:
        registry: ghcr.io
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Prepare tags
      id: prep
      shell: bash
      run: |
        BASE_TAGS=$(echo "${{ inputs.tags }}" | xargs)
        SUFFIX="${{ inputs.suffix }}"
        CLI_TAGS=""
        BUILDER_TAGS=""
        for tag in $BASE_TAGS; do
          CLI_TAGS="$CLI_TAGS ${tag}${SUFFIX}"
          BUILDER_TAGS="$BUILDER_TAGS ${tag}-builder${SUFFIX}"
        done
        CLI_TAGS=$(echo "$CLI_TAGS" | xargs)
        BUILDER_TAGS=$(echo "$BUILDER_TAGS" | xargs)
        echo "cli-tags=$CLI_TAGS" >> $GITHUB_OUTPUT
        echo "builder-tags=$BUILDER_TAGS" >> $GITHUB_OUTPUT

    - name: Create Buildah Cache Directory
      shell: bash
      run: mkdir -p "${{ github.workspace }}/.buildah-cache"

    - name: Cache Buildah Cache Mounts
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.buildah-cache
        key: ${{ runner.os }}-buildah-cache-${{ hashFiles('go.sum') }}
        restore-keys: |
          ${{ runner.os }}-buildah-cache-

    - name: Build CLI image
      id: build-cli
      uses: redhat-actions/buildah-build@v2
      env:
        TMPDIR: ${{ github.workspace }}/.buildah-cache
      with:
        context: .
        containerfiles: ./Containerfile
        platforms: ${{ inputs.platform }}
        image: ghcr.io/aetherpak/cli
        tags: ${{ steps.prep.outputs.cli-tags }}
        extra-args: --target cli
        oci: true

    - name: Build Builder CLI image
      id: build-builder
      uses: redhat-actions/buildah-build@v2
      env:
        TMPDIR: ${{ github.workspace }}/.buildah-cache
      with:
        context: .
        containerfiles: ./Containerfile
        platforms: ${{ inputs.platform }}
        image: ghcr.io/aetherpak/cli
        tags: ${{ steps.prep.outputs.builder-tags }}
        extra-args: --target cli-builder
        oci: true

    - name: Run E2E Smoke Test
      shell: bash
      run: |
        IMAGE_NAME="${{ steps.build-builder.outputs.image }}"
        IMAGE_TAG="$(echo "${{ steps.build-builder.outputs.tags }}" | cut -d' ' -f1)"
        ./tests/smoke_container.sh "${IMAGE_NAME}:${IMAGE_TAG}"

    - name: Push CLI image
      if: ${{ inputs.push == 'true' && inputs.password != '' }}
      uses: redhat-actions/push-to-registry@v2
      with:
        image: ${{ steps.build-cli.outputs.image }}
        tags: ${{ steps.build-cli.outputs.tags }}
        registry: ghcr.io
        extra-args: |
          --tls-verify=true

    - name: Push Builder CLI image
      if: ${{ inputs.push == 'true' && inputs.password != '' }}
      uses: redhat-actions/push-to-registry@v2
      with:
        image: ${{ steps.build-builder.outputs.image }}
        tags: ${{ steps.build-builder.outputs.tags }}
        registry: ghcr.io
        extra-args: |
          --tls-verify=true
